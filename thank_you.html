<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Get Your Hosting</title>
    <!-- Link to your main CSS to keep the header/footer styling -->
    <link rel="stylesheet" href="styles/styles.css">
    <style>
        /* Specific styles for the Thank You message */
        .thanks-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 70vh;
            text-align: center;
            padding: 20px;
            background-color: #f9fbfd;
        }

        .thanks-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
        }

        .icon-check {
            font-size: 60px;
            color: #28a745;
            margin-bottom: 20px;
        }

        .thanks-card h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 2rem;
        }

        .thanks-card p {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .back-btn {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .back-btn:hover {
            background-color: #0056b3;
        }

        .countdown {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="thanks-container">
        <div class="thanks-card">
            <div class="icon-check">✔</div>
            <h1>Message Sent!</h1>
            <p>Thank you for reaching out to <strong>Get Your Hosting</strong>. We have received your inquiry and our team will get back to you within 24-48 business hours.</p>
            
            <a href="index.html" class="back-btn">Back to Home</a>
            
            <p class="countdown">Redirecting you to home in <span id="timer">10</span> seconds...</p>
        </div>
    </main>

    <footer>
        <div id="footer-placeholder"></div>
    </footer>

    <script>
        // Automatic redirection logic
        let seconds = 10;
        const timerDisplay = document.getElementById('timer');

        const countdown = setInterval(() => {
            seconds--;
            timerDisplay.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = 'index.html'; // Redirects to home
            }
        }, 1000);

        // Load your existing navbar/footer if your script.js handles placeholders
    </script>
    <script src="js/script.js"></script>
</body>
</html>
